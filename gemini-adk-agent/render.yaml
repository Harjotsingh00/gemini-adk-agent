services:
  - type: web
    name: gemini-adk-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 60 app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard → Environment
    autoDeploy: true
